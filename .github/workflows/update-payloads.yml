name: Update payload binaries

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-payloads:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download latest payloads and update versions
        run: python scripts/update_payloads.py

      - name: Commit and push if files changed
        run: |
          if git diff --quiet; then
            echo "No payload updates found."
            exit 0
          fi

          git add payloads index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update hekate and atmosphere payloads"
          git push
